name: Build Keylo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Determine next version ────────────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      ver: ${{ steps.bump.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
          IFS='.' read -r major minor patch <<< "${LATEST#v}"
          NEXT="v${major}.${minor}.$((patch + 1))"
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "ver=${NEXT#v}" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT (was $LATEST)"

  # ── macOS (Apple Silicon arm64) ──────────────────────────────────────────────
  build-macos:
    needs: version
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download ONNX Runtime (macOS arm64)
        run: |
          ORT_VER="1.19.2"
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VER}/onnxruntime-osx-arm64-${ORT_VER}.tgz" \
            | tar xz
          mv "onnxruntime-osx-arm64-${ORT_VER}" ort

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release "-DORT_ROOT=${{ github.workspace }}/ort"

      - name: Build
        run: cmake --build build --config Release

      - name: Bundle ORT dylib + sign
        run: |
          ORT_DYLIB="ort/lib/libonnxruntime.1.19.2.dylib"
          VST3="build/Keylo_artefacts/Release/VST3/Keylo.vst3"
          AU="build/Keylo_artefacts/Release/AU/Keylo.component"

          mkdir -p "$VST3/Contents/Frameworks" "$AU/Contents/Frameworks"
          cp "$ORT_DYLIB" "$VST3/Contents/Frameworks/libonnxruntime.1.dylib"
          cp "$ORT_DYLIB" "$AU/Contents/Frameworks/libonnxruntime.1.dylib"

          # Fix dylib's own install name so it matches the bundle path
          install_name_tool -id @loader_path/../Frameworks/libonnxruntime.1.dylib \
            "$VST3/Contents/Frameworks/libonnxruntime.1.dylib"
          install_name_tool -id @loader_path/../Frameworks/libonnxruntime.1.dylib \
            "$AU/Contents/Frameworks/libonnxruntime.1.dylib"

          # Patch the exact ORT reference in each binary
          VST3_ORT_DEP=$(otool -L "$VST3/Contents/MacOS/Keylo" | awk '/onnxruntime/{print $1}')
          AU_ORT_DEP=$(otool -L "$AU/Contents/MacOS/Keylo" | awk '/onnxruntime/{print $1}')
          echo "VST3 ORT dep: $VST3_ORT_DEP"
          echo "AU   ORT dep: $AU_ORT_DEP"

          install_name_tool -change "$VST3_ORT_DEP" \
            @loader_path/../Frameworks/libonnxruntime.1.dylib \
            "$VST3/Contents/MacOS/Keylo"
          install_name_tool -change "$AU_ORT_DEP" \
            @loader_path/../Frameworks/libonnxruntime.1.dylib \
            "$AU/Contents/MacOS/Keylo"

          echo "--- patched VST3 ---"
          otool -L "$VST3/Contents/MacOS/Keylo" | grep onnxruntime
          echo "--- patched AU ---"
          otool -L "$AU/Contents/MacOS/Keylo" | grep onnxruntime

          codesign --force --sign - "$VST3/Contents/Frameworks/libonnxruntime.1.dylib"
          codesign --force --sign - "$AU/Contents/Frameworks/libonnxruntime.1.dylib"
          codesign --force --sign - "$VST3/Contents/MacOS/Keylo"
          codesign --force --sign - "$AU/Contents/MacOS/Keylo"
          codesign --force --sign - "$VST3"
          codesign --force --sign - "$AU"

      - name: Build macOS .pkg installer
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          VER="${{ needs.version.outputs.ver }}"

          mkdir -p pkg-root/Library/Audio/Plug-Ins/VST3
          mkdir -p pkg-root/Library/Audio/Plug-Ins/Components
          cp -r build/Keylo_artefacts/Release/VST3/Keylo.vst3 \
                pkg-root/Library/Audio/Plug-Ins/VST3/
          cp -r build/Keylo_artefacts/Release/AU/Keylo.component \
                pkg-root/Library/Audio/Plug-Ins/Components/

          pkgbuild \
            --root pkg-root \
            --identifier com.snowinch.keylo \
            --version "$VER" \
            --install-location / \
            "Keylo-${TAG}-macOS-arm64.pkg"

      - name: Package macOS ZIP
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          mkdir release
          cp "Keylo-${TAG}-macOS-arm64.pkg" release/
          cp Keylo_Technical_Documentation_v3.pdf release/
          cp README-macOS.txt release/README.txt
          ditto -c -k --sequesterRsrc --keepParent release \
            "Keylo-${TAG}-macOS-arm64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: Keylo-macOS-arm64
          path: Keylo-*-macOS-arm64.zip

  # ── Windows (x64) ────────────────────────────────────────────────────────────
  build-windows:
    needs: version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download ONNX Runtime (Windows x64)
        shell: pwsh
        run: |
          $ver = "1.19.2"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$ver/onnxruntime-win-x64-$ver.zip"
          Invoke-WebRequest -Uri $url -OutFile ort.zip
          Expand-Archive ort.zip -DestinationPath .
          Rename-Item "onnxruntime-win-x64-$ver" "ort"

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release "-DORT_ROOT=${{ github.workspace }}/ort"

      - name: Build
        run: cmake --build build --config Release

      - name: Bundle ORT DLL
        shell: pwsh
        run: |
          $windir = "build\Keylo_artefacts\Release\VST3\Keylo.vst3\Contents\x86_64-win"
          Copy-Item "ort\lib\onnxruntime.dll" $windir

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $tag = "${{ needs.version.outputs.tag }}"
          $ver = "${{ needs.version.outputs.ver }}"

          $staging = "$PWD\nsis_staging"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item -Recurse "build\Keylo_artefacts\Release\VST3\Keylo.vst3" "$staging\Keylo.vst3"
          Copy-Item "Keylo_Technical_Documentation_v3.pdf" "$staging\"
          Copy-Item "README-Windows.txt" "$staging\README.txt"

          $outfile = "$PWD\Keylo-$ver-Windows-x64-Setup.exe"
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          & $nsis "/DVERSION=$ver" "/DSTAGING=$staging" "/DOUTFILE=$outfile" "installer\windows\keylo.nsi"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package Windows ZIP
        shell: pwsh
        run: |
          $tag = "${{ needs.version.outputs.tag }}"
          $ver = "${{ needs.version.outputs.ver }}"

          New-Item -ItemType Directory -Path release | Out-Null
          Move-Item "Keylo-$ver-Windows-x64-Setup.exe" release\
          Copy-Item "Keylo_Technical_Documentation_v3.pdf" release\
          Copy-Item "README-Windows.txt" release\README.txt
          Compress-Archive -Path release\* -DestinationPath "Keylo-$tag-Windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: Keylo-Windows-x64
          path: Keylo-*-Windows-x64.zip

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    needs: [version, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Keylo ${{ needs.version.outputs.tag }}
          files: |
            Keylo-*-macOS-arm64.zip
            Keylo-*-Windows-x64.zip
          generate_release_notes: true
